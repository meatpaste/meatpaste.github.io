<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NEON VOID — Twin-Stick Shooter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#04020c;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
    overscroll-behavior:none;
    position:fixed;
  }
  canvas { display:block; width:100vw; height:100vh; }
  #rotate {
    display:none;
    position:fixed; inset:0; z-index:10;
    background:#04020c;
    color:#7df9ff;
    font-family:"Courier New", monospace;
    text-align:center;
    padding-top:38vh;
    font-size:22px;
    letter-spacing:2px;
  }
  #rotate .icon { font-size:54px; display:block; margin-bottom:18px; animation:spin 2s ease-in-out infinite; }
  @keyframes spin { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }
  @media (orientation: portrait) { #rotate { display:block; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="rotate"><span class="icon">📱</span>ROTATE TO LANDSCAPE</div>
<script>
"use strict";
/* ============================================================
   NEON VOID — a single-file twin-stick arena shooter
   Desktop: WASD move, Arrow keys shoot
   Mobile : left thumb move, right thumb aim & fire
   ============================================================ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));
resize();

/* ---------- utils ---------- */
const TAU = Math.PI * 2;
const rand  = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];
const lerp  = (a, b, t) => a + (b - a) * t;

/* ---------- audio (tiny synth) ---------- */
let AC = null, masterGain = null;
function initAudio() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = 0.14;
    masterGain.connect(AC.destination);
  } catch (e) { AC = null; }
}
function blip(f0, f1, dur, type, vol) {
  if (!AC) return;
  try {
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
    g.gain.setValueAtTime(vol || 0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t + dur + 0.02);
  } catch (e) {}
}
const sfx = {
  shoot:   () => blip(720, 240, 0.07, 'square', 0.18),
  hit:     () => blip(300, 90, 0.1, 'sawtooth', 0.3),
  boom:    () => blip(160, 32, 0.35, 'sawtooth', 0.6),
  hurt:    () => blip(110, 40, 0.3, 'square', 0.6),
  power:   () => { blip(520, 1040, 0.12, 'sine', 0.5); setTimeout(() => blip(780, 1560, 0.14, 'sine', 0.4), 90); },
  wave:    () => { blip(330, 660, 0.18, 'triangle', 0.5); setTimeout(() => blip(495, 990, 0.22, 'triangle', 0.4), 140); },
  bomb:    () => blip(60, 18, 0.7, 'sawtooth', 0.9),
  shield:  () => blip(880, 440, 0.18, 'sine', 0.5),
};

/* ---------- input ---------- */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (state === 'menu' && (e.code === 'Enter' || e.code === 'Space')) startGame();
  if (state === 'over' && overT > 1 && (e.code === 'Enter' || e.code === 'Space')) startGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
// virtual sticks: {id, ox, oy, x, y}
let stickMove = null, stickFire = null;
const STICK_R = 64;

function handleTouchStart(e) {
  e.preventDefault();
  initAudio();
  for (const t of e.changedTouches) {
    if (state !== 'playing') {
      if (state === 'menu' || (state === 'over' && overT > 1)) { startGame(); tryFullscreen(); }
      continue;
    }
    if (t.clientX < W / 2 && !stickMove)      stickMove = { id: t.identifier, ox: t.clientX, oy: t.clientY, x: t.clientX, y: t.clientY };
    else if (t.clientX >= W / 2 && !stickFire) stickFire = { id: t.identifier, ox: t.clientX, oy: t.clientY, x: t.clientX, y: t.clientY };
  }
}
function handleTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (stickMove && t.identifier === stickMove.id) { stickMove.x = t.clientX; stickMove.y = t.clientY; }
    if (stickFire && t.identifier === stickFire.id) { stickFire.x = t.clientX; stickFire.y = t.clientY; }
  }
}
function handleTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (stickMove && t.identifier === stickMove.id) stickMove = null;
    if (stickFire && t.identifier === stickFire.id) stickFire = null;
  }
}
canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove',  handleTouchMove,  { passive: false });
canvas.addEventListener('touchend',   handleTouchEnd,   { passive: false });
canvas.addEventListener('touchcancel',handleTouchEnd,   { passive: false });
canvas.addEventListener('mousedown', () => {
  initAudio();
  if (state === 'menu' || (state === 'over' && overT > 1)) startGame();
});

function tryFullscreen() {
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (fn) { try { fn.call(el).catch(() => {}); } catch (e) {} }
}

function stickVec(stick) {
  if (!stick) return { x: 0, y: 0, len: 0 };
  let dx = (stick.x - stick.ox) / STICK_R, dy = (stick.y - stick.oy) / STICK_R;
  const len = Math.hypot(dx, dy);
  if (len > 1) { dx /= len; dy /= len; }
  return { x: dx, y: dy, len: Math.min(len, 1) };
}

/* ---------- game state ---------- */
let state = 'menu';        // menu | playing | over
let score = 0, highScore = 0;
try { highScore = parseInt(localStorage.getItem('nv_highscore') || '0', 10) || 0; } catch (e) {}
let newBest = false;
let wave = 0, sector = 1;
let overT = 0, menuT = 0;
let shake = 0;
let hitstop = 0;
let damageFlash = 0;
let combo = 0, comboTimer = 0;

let player = null;
let bullets = [], ebullets = [], enemies = [], portals = [], obstacles = [];
let powerups = [], particles = [], shocks = [], floaters = [], banners = [];

/* ---------- background ---------- */
const STARS = [];
for (let i = 0; i < 140; i++) STARS.push({ x: rand(-1, 1), y: rand(-1, 1), z: rand(0.25, 1), tw: rand(0, TAU) });
const NEBULAE = [];
for (let i = 0; i < 5; i++) NEBULAE.push({
  x: rand(0.1, 0.9), y: rand(0.1, 0.9), r: rand(0.25, 0.5),
  hue: pick([265, 200, 320, 180, 290]), drift: rand(0, TAU), spd: rand(0.02, 0.06)
});
let bgPulse = 0;

/* ---------- powerup defs ---------- */
const POWER_DEFS = {
  triple: { color: '#19e6ff', label: 'TRI',  desc: 'TRIPLE SHOT' },
  rapid:  { color: '#ffd60a', label: 'RPD',  desc: 'RAPID FIRE' },
  shield: { color: '#3bffb1', label: 'SHD',  desc: 'SHIELD +1' },
  heal:   { color: '#ff5fa2', label: '+♥',   desc: 'HULL REPAIR' },
  bomb:   { color: '#ff7a1a', label: 'NUK',  desc: 'NOVA BOMB' },
};

/* ---------- entities ---------- */
function makePlayer() {
  return {
    x: W / 2, y: H / 2, vx: 0, vy: 0, r: 13,
    hp: 5, maxHp: 5, iframes: 0,
    aimX: 1, aimY: 0,
    cooldown: 0, shield: 0,
    buffs: { triple: 0, rapid: 0 },
    trail: [],
  };
}

function genObstacles(sectorN) {
  const obs = [];
  const n = Math.min(9, 3 + sectorN + randi(0, 2));
  let tries = 0;
  while (obs.length < n && tries < 300) {
    tries++;
    let o;
    if (Math.random() < 0.5) {
      const w = rand(50, 140), h = rand(50, 140);
      o = { type: 'rect', x: rand(50, W - 50 - w), y: rand(50, H - 50 - h), w, h, hue: pick([190, 260, 320]) };
      o.cx = o.x + w / 2; o.cy = o.y + h / 2; o.rad = Math.hypot(w, h) / 2;
    } else {
      const r = rand(26, 60);
      o = { type: 'circle', x: rand(60 + r, W - 60 - r), y: rand(60 + r, H - 60 - r), r, hue: pick([190, 260, 320]) };
      o.cx = o.x; o.cy = o.y; o.rad = r;
    }
    if (dist2(o.cx, o.cy, W / 2, H / 2) < 200 * 200) continue;          // keep spawn area clear
    let ok = true;
    for (const p of obs) if (dist2(o.cx, o.cy, p.cx, p.cy) < (o.rad + p.rad + 70) ** 2) { ok = false; break; }
    if (ok) obs.push(o);
  }
  return obs;
}

function circleVsObstacle(x, y, r, o) {
  // returns push vector {x,y} or null
  if (o.type === 'circle') {
    const d2 = dist2(x, y, o.x, o.y), rr = r + o.r;
    if (d2 >= rr * rr || d2 === 0) return null;
    const d = Math.sqrt(d2);
    return { x: (x - o.x) / d * (rr - d), y: (y - o.y) / d * (rr - d) };
  }
  const nx = clamp(x, o.x, o.x + o.w), ny = clamp(y, o.y, o.y + o.h);
  const d2v = dist2(x, y, nx, ny);
  if (d2v >= r * r) return null;
  if (d2v === 0) {
    // center inside rect: push out along smallest axis
    const l = x - o.x, rgt = o.x + o.w - x, t = y - o.y, b = o.y + o.h - y;
    const m = Math.min(l, rgt, t, b);
    if (m === l)   return { x: -(l + r), y: 0 };
    if (m === rgt) return { x: rgt + r, y: 0 };
    if (m === t)   return { x: 0, y: -(t + r) };
    return { x: 0, y: b + r };
  }
  const d = Math.sqrt(d2v);
  return { x: (x - nx) / d * (r - d), y: (y - ny) / d * (r - d) };
}

function resolveObstacles(ent) {
  for (const o of obstacles) {
    const push = circleVsObstacle(ent.x, ent.y, ent.r, o);
    if (push) { ent.x += push.x; ent.y += push.y; }
  }
}

function pointBlocked(x, y, r) {
  for (const o of obstacles) if (circleVsObstacle(x, y, r, o)) return true;
  return false;
}

/* ---------- enemies ---------- */
const ENEMY_TYPES = {
  chaser:   { cost: 1, unlock: 1, score: 100 },
  darter:   { cost: 1, unlock: 2, score: 150 },
  shooter:  { cost: 2, unlock: 3, score: 200 },
  splitter: { cost: 3, unlock: 5, score: 250 },
  tank:     { cost: 4, unlock: 7, score: 400 },
};

function makeEnemy(type, x, y) {
  const lvl = wave;
  const e = { type, x, y, vx: 0, vy: 0, t: rand(0, TAU), hitT: 0 };
  switch (type) {
    case 'chaser':
      e.r = 14; e.hp = 1 + Math.floor(lvl / 4); e.spd = Math.min(190, 75 + lvl * 6); e.color = '#ff3b6b'; break;
    case 'darter':
      e.r = 10; e.hp = 1; e.spd = Math.min(260, 150 + lvl * 5); e.color = '#ffae00'; break;
    case 'shooter':
      e.r = 16; e.hp = 2 + Math.floor(lvl / 4); e.spd = Math.min(120, 55 + lvl * 3);
      e.color = '#b86bff'; e.fireT = rand(0.8, 1.6); break;
    case 'splitter':
      e.r = 24; e.hp = 4 + Math.floor(lvl / 3); e.spd = 50 + lvl * 2; e.color = '#3bffb1'; break;
    case 'mini':
      e.r = 9; e.hp = 1; e.spd = Math.min(240, 170 + lvl * 4); e.color = '#3bffb1'; break;
    case 'tank':
      e.r = 30; e.hp = 10 + lvl; e.spd = 38 + lvl; e.color = '#ff7a1a'; break;
  }
  e.maxHp = e.hp;
  return e;
}

let spawnQueue = [], spawnTimer = 0, waveActive = false, intermission = 0;

function buildWave(n) {
  const unlocked = Object.keys(ENEMY_TYPES).filter(t => ENEMY_TYPES[t].unlock <= n);
  let budget = 4 + n * 2;
  const q = [];
  while (budget > 0) {
    const t = pick(unlocked);
    const c = ENEMY_TYPES[t].cost;
    if (c <= budget) { q.push(t); budget -= c; }
    else budget--;
  }
  return q;
}

function spawnPoint() {
  for (let i = 0; i < 40; i++) {
    let x, y;
    if (Math.random() < 0.6) { // edge
      const side = randi(0, 3);
      if (side === 0)      { x = rand(40, W - 40); y = 40; }
      else if (side === 1) { x = rand(40, W - 40); y = H - 40; }
      else if (side === 2) { x = 40; y = rand(40, H - 40); }
      else                 { x = W - 40; y = rand(40, H - 40); }
    } else { x = rand(60, W - 60); y = rand(60, H - 60); }
    if (dist2(x, y, player.x, player.y) > 240 * 240 && !pointBlocked(x, y, 32)) return { x, y };
  }
  return { x: rand(60, W - 60), y: 60 };
}

function startWave() {
  wave++;
  if (wave > 1 && (wave - 1) % 3 === 0) {
    sector++;
    obstacles = genObstacles(sector);
    // never trap the player in a fresh obstacle
    resolveObstacles(player);
    banners.push({ text: 'SECTOR ' + sector, sub: 'TOPOLOGY RECONFIGURED', t: 0, dur: 2.2, color: '#b86bff' });
  }
  banners.push({ text: 'WAVE ' + wave, sub: null, t: 0, dur: 1.8, color: '#19e6ff' });
  spawnQueue = buildWave(wave);
  spawnTimer = 0.5;
  waveActive = true;
  sfx.wave();
}

/* ---------- effects ---------- */
function addParticles(x, y, color, n, spd, life, size) {
  for (let i = 0; i < n; i++) {
    if (particles.length > 420) break;
    const a = rand(0, TAU), s = rand(spd * 0.3, spd);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: rand(life * 0.5, life), maxLife: life, color,
      size: rand(size * 0.5, size), drag: rand(0.9, 0.98)
    });
  }
}
function addShock(x, y, color, maxR, dur) {
  shocks.push({ x, y, r: 6, maxR, t: 0, dur, color });
}
function addFloater(x, y, text, color, big) {
  floaters.push({ x, y, text, color, t: 0, big: !!big });
}

function explode(x, y, color, big) {
  addParticles(x, y, color, big ? 36 : 18, big ? 360 : 240, 0.8, big ? 5 : 3.5);
  addParticles(x, y, '#ffffff', big ? 10 : 5, big ? 200 : 140, 0.35, 2.5);
  addShock(x, y, color, big ? 110 : 60, 0.45);
  shake = Math.min(18, shake + (big ? 9 : 4));
  sfx.boom();
}

/* ---------- powerups ---------- */
function dropPowerup(x, y) {
  const roll = Math.random();
  let type;
  if (roll < 0.24) type = 'triple';
  else if (roll < 0.48) type = 'rapid';
  else if (roll < 0.68) type = 'shield';
  else if (roll < 0.88) type = 'heal';
  else type = 'bomb';
  powerups.push({ x, y, type, t: 0, life: 9 });
}

function applyPowerup(p) {
  const def = POWER_DEFS[p.type];
  sfx.power();
  addShock(player.x, player.y, def.color, 70, 0.4);
  addFloater(player.x, player.y - 26, def.desc, def.color, true);
  switch (p.type) {
    case 'triple': player.buffs.triple = 9; break;
    case 'rapid':  player.buffs.rapid = 9; break;
    case 'shield': player.shield = Math.min(3, player.shield + 1); sfx.shield(); break;
    case 'heal':   player.hp = Math.min(player.maxHp, player.hp + 1); break;
    case 'bomb':   novaBomb(); break;
  }
}

function novaBomb() {
  sfx.bomb();
  bgPulse = 1;
  shake = 22;
  hitstop = 0.12;
  addShock(player.x, player.y, '#ff7a1a', Math.max(W, H), 0.9);
  addParticles(player.x, player.y, '#ff7a1a', 60, 500, 1, 5);
  ebullets.length = 0;
  for (const e of enemies) {
    e.hp -= 8;
    addParticles(e.x, e.y, e.color, 8, 200, 0.5, 3);
  }
}

/* ---------- scoring ---------- */
function comboMult() { return 1 + Math.min(8, Math.floor(combo / 4)); }

function killEnemy(e, idx) {
  const base = ENEMY_TYPES[e.type] ? ENEMY_TYPES[e.type].score : 80;
  combo++;
  comboTimer = 2.2;
  const gained = base * comboMult();
  score += gained;
  addFloater(e.x, e.y, '+' + gained, '#ffffff');
  if (comboMult() > 1) addFloater(e.x, e.y + 18, 'x' + comboMult(), '#ffd60a');
  explode(e.x, e.y, e.color, e.r > 20);
  hitstop = Math.max(hitstop, 0.035);
  if (e.type === 'splitter') {
    for (let i = 0; i < 3; i++) {
      const m = makeEnemy('mini', e.x + rand(-14, 14), e.y + rand(-14, 14));
      enemies.push(m);
    }
  }
  if (Math.random() < 0.17 && e.type !== 'mini') dropPowerup(e.x, e.y);
  enemies.splice(idx, 1);
}

/* ---------- game flow ---------- */
function startGame() {
  initAudio();
  state = 'playing';
  score = 0; wave = 0; sector = 1;
  combo = 0; comboTimer = 0;
  newBest = false;
  shake = 0; hitstop = 0; damageFlash = 0;
  player = makePlayer();
  bullets = []; ebullets = []; enemies = []; portals = [];
  powerups = []; particles = []; shocks = []; floaters = []; banners = [];
  obstacles = genObstacles(1);
  spawnQueue = []; waveActive = false; intermission = 0.8;
}

function gameOver() {
  state = 'over';
  overT = 0;
  explode(player.x, player.y, '#19e6ff', true);
  addParticles(player.x, player.y, '#ffffff', 40, 420, 1.2, 4);
  addShock(player.x, player.y, '#19e6ff', 300, 0.8);
  shake = 26;
  if (score > highScore) {
    highScore = score;
    newBest = true;
    try { localStorage.setItem('nv_highscore', String(highScore)); } catch (e) {}
  }
}

function hurtPlayer(dmg) {
  if (player.iframes > 0) return;
  if (player.shield > 0) {
    player.shield--;
    player.iframes = 1.2;
    sfx.shield();
    addShock(player.x, player.y, '#3bffb1', 90, 0.5);
    addParticles(player.x, player.y, '#3bffb1', 16, 260, 0.6, 3);
    return;
  }
  player.hp -= dmg;
  player.iframes = 1.4;
  damageFlash = 1;
  shake = Math.min(24, shake + 12);
  sfx.hurt();
  addParticles(player.x, player.y, '#ff3b6b', 20, 300, 0.7, 4);
  if (player.hp <= 0) gameOver();
}

/* ---------- firing ---------- */
function fireBullets(dirX, dirY) {
  const spread = player.buffs.triple > 0;
  const angles = spread ? [-0.2, 0, 0.2] : [0];
  const base = Math.atan2(dirY, dirX);
  for (const off of angles) {
    const a = base + off;
    bullets.push({
      x: player.x + Math.cos(a) * (player.r + 6),
      y: player.y + Math.sin(a) * (player.r + 6),
      vx: Math.cos(a) * 560, vy: Math.sin(a) * 560,
      r: 4, life: 1.4,
    });
  }
  player.cooldown = player.buffs.rapid > 0 ? 0.07 : 0.15;
  shake = Math.min(shake + 0.4, 4);
  sfx.shoot();
  // muzzle flash
  addParticles(player.x + dirX * 18, player.y + dirY * 18, '#9ef3ff', 3, 120, 0.15, 2);
}

/* ---------- update ---------- */
function update(dt) {
  menuT += dt;
  bgPulse = Math.max(0, bgPulse - dt * 1.2);
  damageFlash = Math.max(0, damageFlash - dt * 2.5);
  shake = Math.max(0, shake - dt * 38);

  // background star drift (slow warp)
  for (const s of STARS) {
    s.z -= dt * 0.018;
    if (s.z < 0.22) { s.z = 1; s.x = rand(-1, 1); s.y = rand(-1, 1); }
  }

  if (state !== 'playing') {
    if (state === 'over') overT += dt;
    updateFx(dt);
    return;
  }

  if (hitstop > 0) { hitstop -= dt; updateFx(dt * 0.12); return; }

  /* --- player movement --- */
  let mx = 0, my = 0;
  if (keys['KeyW']) my -= 1;
  if (keys['KeyS']) my += 1;
  if (keys['KeyA']) mx -= 1;
  if (keys['KeyD']) mx += 1;
  const mv = stickVec(stickMove);
  if (mv.len > 0.12) { mx = mv.x; my = mv.y; }
  const mlen = Math.hypot(mx, my);
  if (mlen > 1) { mx /= mlen; my /= mlen; }

  const SPD = 250;
  player.vx = lerp(player.vx, mx * SPD, 1 - Math.pow(0.0001, dt));
  player.vy = lerp(player.vy, my * SPD, 1 - Math.pow(0.0001, dt));
  player.x += player.vx * dt;
  player.y += player.vy * dt;
  player.x = clamp(player.x, player.r + 4, W - player.r - 4);
  player.y = clamp(player.y, player.r + 4, H - player.r - 4);
  resolveObstacles(player);

  // trail
  if (Math.hypot(player.vx, player.vy) > 30) {
    player.trail.push({ x: player.x, y: player.y, a: Math.atan2(player.vy, player.vx), t: 0.3 });
    if (player.trail.length > 14) player.trail.shift();
  }
  for (let i = player.trail.length - 1; i >= 0; i--) {
    player.trail[i].t -= dt;
    if (player.trail[i].t <= 0) player.trail.splice(i, 1);
  }

  /* --- aiming & firing --- */
  let fx = 0, fy = 0;
  if (keys['ArrowUp']) fy -= 1;
  if (keys['ArrowDown']) fy += 1;
  if (keys['ArrowLeft']) fx -= 1;
  if (keys['ArrowRight']) fx += 1;
  const fv = stickVec(stickFire);
  if (fv.len > 0.25) { fx = fv.x; fy = fv.y; }
  const flen = Math.hypot(fx, fy);
  player.cooldown -= dt;
  if (flen > 0) {
    player.aimX = fx / flen; player.aimY = fy / flen;
    if (player.cooldown <= 0) fireBullets(player.aimX, player.aimY);
  } else if (mlen > 0.1) {
    player.aimX = mx / mlen; player.aimY = my / mlen;
  }

  player.iframes = Math.max(0, player.iframes - dt);
  player.buffs.triple = Math.max(0, player.buffs.triple - dt);
  player.buffs.rapid = Math.max(0, player.buffs.rapid - dt);

  comboTimer -= dt;
  if (comboTimer <= 0) combo = 0;

  /* --- wave management --- */
  if (!waveActive) {
    intermission -= dt;
    if (intermission <= 0) startWave();
  } else {
    if (spawnQueue.length > 0) {
      spawnTimer -= dt;
      const maxAlive = Math.min(16, 6 + wave);
      if (spawnTimer <= 0 && enemies.length + portals.length < maxAlive) {
        const p = spawnPoint();
        portals.push({ x: p.x, y: p.y, t: 0, dur: 0.8, type: spawnQueue.shift() });
        spawnTimer = Math.max(0.25, 0.85 - wave * 0.03);
      }
    } else if (enemies.length === 0 && portals.length === 0) {
      waveActive = false;
      intermission = 2;
      const bonus = 50 * wave;
      score += bonus;
      addFloater(player.x, player.y - 40, 'WAVE CLEAR +' + bonus, '#3bffb1', true);
    }
  }

  /* --- portals --- */
  for (let i = portals.length - 1; i >= 0; i--) {
    const p = portals[i];
    p.t += dt;
    if (p.t >= p.dur) {
      enemies.push(makeEnemy(p.type, p.x, p.y));
      addParticles(p.x, p.y, '#ffffff', 8, 150, 0.3, 2);
      portals.splice(i, 1);
    }
  }

  /* --- enemies --- */
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.t += dt;
    e.hitT = Math.max(0, e.hitT - dt);
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    const ux = dx / d, uy = dy / d;

    switch (e.type) {
      case 'chaser': case 'mini': case 'tank':
        e.vx = lerp(e.vx, ux * e.spd, dt * 3);
        e.vy = lerp(e.vy, uy * e.spd, dt * 3);
        break;
      case 'darter': {
        const px = -uy, py = ux;
        const wob = Math.sin(e.t * 6) * 0.9;
        e.vx = lerp(e.vx, (ux + px * wob) * e.spd, dt * 4);
        e.vy = lerp(e.vy, (uy + py * wob) * e.spd, dt * 4);
        break;
      }
      case 'shooter': {
        const want = d > 260 ? 1 : (d < 180 ? -1 : 0);
        const orbit = Math.sin(e.t * 1.5);
        e.vx = lerp(e.vx, (ux * want - uy * orbit) * e.spd, dt * 3);
        e.vy = lerp(e.vy, (uy * want + ux * orbit) * e.spd, dt * 3);
        e.fireT -= dt;
        if (e.fireT <= 0 && d < 560) {
          e.fireT = Math.max(0.8, 1.7 - wave * 0.05);
          const bs = Math.min(330, 190 + wave * 9);
          ebullets.push({ x: e.x, y: e.y, vx: ux * bs, vy: uy * bs, r: 5, life: 4 });
          addParticles(e.x, e.y, e.color, 4, 100, 0.2, 2);
        }
        break;
      }
      case 'splitter': {
        const wob2 = Math.sin(e.t * 2.5) * 0.4;
        e.vx = lerp(e.vx, (ux - uy * wob2) * e.spd, dt * 2);
        e.vy = lerp(e.vy, (uy + ux * wob2) * e.spd, dt * 2);
        break;
      }
    }
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.x = clamp(e.x, e.r, W - e.r);
    e.y = clamp(e.y, e.r, H - e.r);
    resolveObstacles(e);

    // gentle separation between enemies
    for (let j = i - 1; j >= 0; j--) {
      const o = enemies[j];
      const rr = e.r + o.r;
      const d2v = dist2(e.x, e.y, o.x, o.y);
      if (d2v < rr * rr && d2v > 0) {
        const dd = Math.sqrt(d2v), ov = (rr - dd) / 2;
        const sx = (e.x - o.x) / dd * ov, sy = (e.y - o.y) / dd * ov;
        e.x += sx; e.y += sy; o.x -= sx; o.y -= sy;
      }
    }

    // touch player
    if (dist2(e.x, e.y, player.x, player.y) < (e.r + player.r) ** 2) {
      hurtPlayer(e.type === 'tank' ? 2 : 1);
      // knock enemy back a bit
      e.vx -= ux * 200; e.vy -= uy * 200;
    }
  }

  /* --- player bullets --- */
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.life -= dt;
    let dead = b.life <= 0 || b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10;
    if (!dead && pointBlocked(b.x, b.y, b.r)) {
      addParticles(b.x, b.y, '#9ef3ff', 4, 130, 0.25, 2);
      dead = true;
    }
    if (!dead) {
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (dist2(b.x, b.y, e.x, e.y) < (b.r + e.r) ** 2) {
          e.hp -= 1;
          e.hitT = 0.08;
          e.vx += b.vx * 0.04; e.vy += b.vy * 0.04;
          addParticles(b.x, b.y, e.color, 5, 160, 0.3, 2.5);
          sfx.hit();
          if (e.hp <= 0) killEnemy(e, j);
          dead = true;
          break;
        }
      }
    }
    if (dead) bullets.splice(i, 1);
  }

  // sweep enemies killed by nova bomb
  for (let j = enemies.length - 1; j >= 0; j--) if (enemies[j].hp <= 0) killEnemy(enemies[j], j);

  /* --- enemy bullets --- */
  for (let i = ebullets.length - 1; i >= 0; i--) {
    const b = ebullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.life -= dt;
    let dead = b.life <= 0 || b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10;
    if (!dead && pointBlocked(b.x, b.y, b.r)) {
      addParticles(b.x, b.y, '#ff5fa2', 4, 120, 0.2, 2);
      dead = true;
    }
    if (!dead && dist2(b.x, b.y, player.x, player.y) < (b.r + player.r) ** 2) {
      hurtPlayer(1);
      dead = true;
    }
    if (dead) ebullets.splice(i, 1);
  }

  /* --- powerups --- */
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.t += dt; p.life -= dt;
    // magnet toward player when close
    const d2v = dist2(p.x, p.y, player.x, player.y);
    if (d2v < 120 * 120) {
      const d = Math.sqrt(d2v) || 1;
      p.x += (player.x - p.x) / d * 220 * dt;
      p.y += (player.y - p.y) / d * 220 * dt;
    }
    if (d2v < (player.r + 16) ** 2) { applyPowerup(p); powerups.splice(i, 1); continue; }
    if (p.life <= 0) powerups.splice(i, 1);
  }

  updateFx(dt);
}

function updateFx(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= p.drag; p.vy *= p.drag;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = shocks.length - 1; i >= 0; i--) {
    const s = shocks[i];
    s.t += dt;
    if (s.t >= s.dur) shocks.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.t += dt;
    f.y -= 36 * dt;
    if (f.t > 1.1) floaters.splice(i, 1);
  }
  for (let i = banners.length - 1; i >= 0; i--) {
    banners[i].t += dt;
    if (banners[i].t > banners[i].dur) banners.splice(i, 1);
  }
}

/* ---------- drawing ---------- */
function glow(x, y, r, color, alpha) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = alpha;
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // deep gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#070218');
  bg.addColorStop(0.55, '#0a0524');
  bg.addColorStop(1, '#04020c');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const camX = player ? (player.x - W / 2) : Math.sin(menuT * 0.3) * 80;
  const camY = player ? (player.y - H / 2) : Math.cos(menuT * 0.23) * 50;

  // nebulae (deepest parallax layer)
  for (const n of NEBULAE) {
    const nx = n.x * W - camX * 0.06 + Math.sin(menuT * n.spd + n.drift) * 24;
    const ny = n.y * H - camY * 0.06 + Math.cos(menuT * n.spd * 0.8 + n.drift) * 18;
    const r = n.r * Math.min(W, H) * (1 + bgPulse * 0.3);
    const g = ctx.createRadialGradient(nx, ny, 0, nx, ny, r);
    g.addColorStop(0, `hsla(${n.hue},85%,55%,${0.07 + bgPulse * 0.08})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(nx - r, ny - r, r * 2, r * 2);
  }

  // 3D starfield: depth-projected, parallax scales with 1/z
  const cx = W / 2, cy = H / 2;
  for (const s of STARS) {
    const px = cx + (s.x * W * 0.75 - camX * 0.35) / s.z;
    const py = cy + (s.y * H * 0.75 - camY * 0.35) / s.z;
    if (px < -5 || px > W + 5 || py < -5 || py > H + 5) continue;
    const size = 1.6 / s.z;
    const tw = 0.55 + 0.45 * Math.sin(menuT * 2.4 + s.tw);
    ctx.globalAlpha = clamp((1.1 - s.z) * tw, 0.08, 0.9);
    ctx.fillStyle = s.z < 0.45 ? '#cfeaff' : '#8fa8d8';
    ctx.fillRect(px - size / 2, py - size / 2, size, size);
  }
  ctx.globalAlpha = 1;

  // mid parallax grid
  const gs = 90;
  const ox = (-camX * 0.22) % gs, oy = (-camY * 0.22) % gs;
  ctx.strokeStyle = `rgba(60,120,255,${0.05 + bgPulse * 0.12})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = ox; x < W; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let y = oy; y < H; y += gs) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
}

function drawObstacles() {
  for (const o of obstacles) {
    const pulse = 0.5 + 0.5 * Math.sin(menuT * 1.6 + o.cx * 0.01);
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = `hsla(${o.hue},90%,65%,${0.55 + pulse * 0.25})`;
    ctx.fillStyle = `hsla(${o.hue},70%,18%,0.55)`;
    if (o.type === 'rect') {
      ctx.beginPath();
      const rr = 10;
      ctx.roundRect(o.x, o.y, o.w, o.h, rr);
      ctx.fill(); ctx.stroke();
      glow(o.cx, o.cy, o.rad * 1.3, `hsla(${o.hue},90%,55%,0.5)`, 0.06 + pulse * 0.04);
    } else {
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, TAU);
      ctx.fill(); ctx.stroke();
      glow(o.x, o.y, o.r * 1.6, `hsla(${o.hue},90%,55%,0.5)`, 0.06 + pulse * 0.04);
    }
    ctx.restore();
  }
}

function drawShip(x, y, ang, scale, alpha, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ang);
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(16, 0);
  ctx.lineTo(-10, 10);
  ctx.lineTo(-5, 0);
  ctx.lineTo(-10, -10);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = alpha * 0.9;
  ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  // engine trail afterimages
  for (const t of player.trail) {
    drawShip(t.x, t.y, t.a, 0.8 * (t.t / 0.3), 0.16 * (t.t / 0.3), '#19e6ff');
  }
  const blink = player.iframes > 0 && Math.floor(menuT * 14) % 2 === 0;
  if (!blink) {
    glow(player.x, player.y, 42, '#19e6ff', 0.25);
    const ang = Math.atan2(player.aimY, player.aimX);
    drawShip(player.x, player.y, ang, 1, 1, '#19e6ff');
    // cockpit dot
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(player.x + Math.cos(ang) * 4, player.y + Math.sin(ang) * 4, 2.5, 0, TAU);
    ctx.fill();
  }
  if (player.shield > 0) {
    ctx.strokeStyle = '#3bffb1';
    ctx.lineWidth = 2;
    for (let i = 0; i < player.shield; i++) {
      ctx.globalAlpha = 0.5 - i * 0.12;
      ctx.beginPath();
      ctx.arc(player.x, player.y, 22 + i * 5 + Math.sin(menuT * 4) * 1.5, 0, TAU);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawEnemies() {
  for (const p of portals) {
    const k = p.t / p.dur;
    ctx.strokeStyle = `rgba(255,90,140,${0.4 + k * 0.5})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 26 * (1 - k) + 6, 0, TAU);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(p.x, p.y, 30, 0, TAU * k);
    ctx.stroke();
    glow(p.x, p.y, 40, '#ff5fa2', 0.1 + k * 0.15);
  }
  for (const e of enemies) {
    const flash = e.hitT > 0;
    const c = flash ? '#ffffff' : e.color;
    glow(e.x, e.y, e.r * 2.4, e.color, 0.16);
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.fillStyle = c;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    switch (e.type) {
      case 'chaser': case 'mini': {
        ctx.rotate(a);
        ctx.beginPath();
        ctx.moveTo(e.r, 0); ctx.lineTo(-e.r * 0.8, e.r * 0.75); ctx.lineTo(-e.r * 0.4, 0); ctx.lineTo(-e.r * 0.8, -e.r * 0.75);
        ctx.closePath(); ctx.fill();
        break;
      }
      case 'darter': {
        ctx.rotate(e.t * 9);
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const aa = i / 4 * TAU;
          ctx.lineTo(Math.cos(aa) * e.r * 1.25, Math.sin(aa) * e.r * 1.25);
          ctx.lineTo(Math.cos(aa + TAU / 8) * e.r * 0.5, Math.sin(aa + TAU / 8) * e.r * 0.5);
        }
        ctx.closePath(); ctx.fill();
        break;
      }
      case 'shooter': {
        ctx.rotate(e.t * 1.5);
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const aa = i / 6 * TAU;
          ctx.lineTo(Math.cos(aa) * e.r, Math.sin(aa) * e.r);
        }
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 0.9;
        ctx.stroke();
        break;
      }
      case 'splitter': {
        ctx.beginPath();
        const k = 8;
        for (let i = 0; i <= k; i++) {
          const aa = i / k * TAU;
          const rr = e.r * (1 + Math.sin(aa * 3 + e.t * 3) * 0.12);
          ctx.lineTo(Math.cos(aa) * rr, Math.sin(aa) * rr);
        }
        ctx.closePath(); ctx.fill();
        break;
      }
      case 'tank': {
        ctx.rotate(a);
        ctx.beginPath();
        ctx.rect(-e.r * 0.85, -e.r * 0.7, e.r * 1.7, e.r * 1.4);
        ctx.fill();
        ctx.fillStyle = flash ? '#ffffff' : '#ffd0a0';
        ctx.fillRect(0, -e.r * 0.25, e.r * 1.1, e.r * 0.5);
        break;
      }
    }
    ctx.restore();
    // hp bar for beefy enemies
    if (e.maxHp > 2 && e.hp < e.maxHp) {
      const w = e.r * 2;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x - w / 2, e.y - e.r - 10, w, 4);
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - w / 2, e.y - e.r - 10, w * (e.hp / e.maxHp), 4);
    }
  }
}

function drawBullets() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const b of bullets) {
    glow(b.x, b.y, 14, '#19e6ff', 0.5);
    ctx.fillStyle = '#dffaff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, TAU);
    ctx.fill();
    // streak
    ctx.strokeStyle = 'rgba(25,230,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - b.vx * 0.022, b.y - b.vy * 0.022);
    ctx.stroke();
  }
  for (const b of ebullets) {
    glow(b.x, b.y, 16, '#ff5fa2', 0.6);
    ctx.fillStyle = '#ffd5e8';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, TAU);
    ctx.fill();
  }
  ctx.restore();
}

function drawPowerups() {
  for (const p of powerups) {
    const def = POWER_DEFS[p.type];
    const bob = Math.sin(p.t * 4) * 3;
    const blinkOut = p.life < 2.5 && Math.floor(p.t * 8) % 2 === 0;
    if (blinkOut) continue;
    glow(p.x, p.y + bob, 30, def.color, 0.35);
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    ctx.rotate(Math.sin(p.t * 2) * 0.2);
    ctx.fillStyle = 'rgba(5,5,20,0.85)';
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-14, -14, 28, 28, 7);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = def.color;
    ctx.font = 'bold 10px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.label, 0, 1);
    ctx.restore();
  }
}

function drawFx() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    const k = p.life / p.maxLife;
    ctx.globalAlpha = clamp(k, 0, 1) * 0.9;
    ctx.fillStyle = p.color;
    const s = p.size * (0.5 + k * 0.5);
    ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
  }
  ctx.globalAlpha = 1;
  for (const s of shocks) {
    const k = s.t / s.dur;
    const r = s.r + (s.maxR - s.r) * (1 - Math.pow(1 - k, 2.2));
    ctx.globalAlpha = (1 - k) * 0.8;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 3 * (1 - k) + 1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, TAU);
    ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  for (const f of floaters) {
    const k = clamp(1 - f.t / 1.1, 0, 1);
    ctx.globalAlpha = k;
    ctx.fillStyle = f.color;
    ctx.font = (f.big ? 'bold 18px' : 'bold 14px') + ' "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawBanners() {
  for (const b of banners) {
    const k = b.t / b.dur;
    let a = 1;
    if (k < 0.15) a = k / 0.15;
    else if (k > 0.75) a = (1 - k) / 0.25;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    ctx.fillStyle = b.color;
    ctx.font = 'bold 46px "Courier New", monospace';
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 24;
    ctx.fillText(b.text, W / 2, H * 0.32);
    if (b.sub) {
      ctx.font = '16px "Courier New", monospace';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(b.sub, W / 2, H * 0.32 + 30);
    }
    ctx.restore();
  }
}

function drawHUD() {
  ctx.save();
  ctx.font = 'bold 16px "Courier New", monospace';
  // hp pips
  for (let i = 0; i < player.maxHp; i++) {
    ctx.fillStyle = i < player.hp ? '#ff5fa2' : 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    const hx = 22 + i * 22, hy = 24;
    ctx.moveTo(hx, hy + 4);
    ctx.bezierCurveTo(hx - 9, hy - 6, hx - 2, hy - 12, hx, hy - 5);
    ctx.bezierCurveTo(hx + 2, hy - 12, hx + 9, hy - 6, hx, hy + 4);
    ctx.fill();
  }
  // shield pips
  if (player.shield > 0) {
    ctx.fillStyle = '#3bffb1';
    ctx.textAlign = 'left';
    ctx.fillText('◈'.repeat(player.shield), 18, 52);
  }
  // score
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 24px "Courier New", monospace';
  ctx.fillText(String(score).padStart(7, '0'), W / 2, 32);
  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('BEST ' + String(Math.max(score, highScore)).padStart(7, '0'), W / 2, 50);
  // combo
  if (combo > 1 && comboMult() > 1) {
    ctx.fillStyle = '#ffd60a';
    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.fillText('COMBO x' + comboMult(), W / 2, 74);
  }
  // wave / sector
  ctx.textAlign = 'right';
  ctx.fillStyle = '#19e6ff';
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.fillText('WAVE ' + wave, W - 20, 28);
  ctx.fillStyle = '#b86bff';
  ctx.font = '12px "Courier New", monospace';
  ctx.fillText('SECTOR ' + sector, W - 20, 46);
  // buff timers
  let bx = W - 20;
  const drawBuff = (label, color, t) => {
    if (t <= 0) return;
    ctx.fillStyle = color;
    ctx.font = 'bold 13px "Courier New", monospace';
    ctx.fillText(label + ' ' + t.toFixed(0) + 's', bx, 68);
    bx -= 86;
  };
  drawBuff('TRI', '#19e6ff', player.buffs.triple);
  drawBuff('RPD', '#ffd60a', player.buffs.rapid);
  ctx.restore();

  // touch sticks
  if (IS_TOUCH) {
    drawStick(stickMove, '#19e6ff');
    drawStick(stickFire, '#ff5fa2');
  }
}

function drawStick(stick, color) {
  if (!stick) return;
  ctx.save();
  ctx.globalAlpha = 0.32;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(stick.ox, stick.oy, STICK_R, 0, TAU);
  ctx.stroke();
  const v = stickVec(stick);
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(stick.ox + v.x * STICK_R, stick.oy + v.y * STICK_R, 22, 0, TAU);
  ctx.fill();
  ctx.restore();
}

function drawCenteredPanel(lines) {
  ctx.textAlign = 'center';
  for (const ln of lines) {
    ctx.font = ln.font;
    ctx.fillStyle = ln.color;
    if (ln.glow) { ctx.shadowColor = ln.color; ctx.shadowBlur = ln.glow; }
    else ctx.shadowBlur = 0;
    ctx.fillText(ln.text, W / 2, ln.y);
  }
  ctx.shadowBlur = 0;
}

function drawMenu() {
  const pulse = 0.7 + 0.3 * Math.sin(menuT * 2.2);
  drawCenteredPanel([
    { text: 'N E O N   V O I D', font: `bold ${Math.min(64, W * 0.07)}px "Courier New", monospace`, color: '#19e6ff', y: H * 0.24, glow: 30 * pulse },
    { text: 'A TWIN-STICK SURVIVAL SHOOTER', font: '14px "Courier New", monospace', color: '#b86bff', y: H * 0.24 + 30 },
  ]);

  const cy = H * 0.46;
  ctx.textAlign = 'center';
  ctx.font = 'bold 15px "Courier New", monospace';
  if (IS_TOUCH) {
    ctx.fillStyle = '#ffffff';
    ctx.fillText('LEFT THUMB — MOVE        RIGHT THUMB — AIM & FIRE', W / 2, cy);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('(keyboard: WASD move · arrow keys shoot)', W / 2, cy + 24);
  } else {
    ctx.fillStyle = '#ffffff';
    ctx.fillText('W A S D — MOVE        ARROW KEYS — SHOOT', W / 2, cy);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('(on mobile: left thumb moves, right thumb fires)', W / 2, cy + 24);
  }

  // powerup legend
  const types = Object.keys(POWER_DEFS);
  const gap = Math.min(120, (W - 80) / types.length);
  const x0 = W / 2 - gap * (types.length - 1) / 2;
  for (let i = 0; i < types.length; i++) {
    const def = POWER_DEFS[types[i]];
    const x = x0 + i * gap, y = H * 0.62;
    glow(x, y, 22, def.color, 0.3);
    ctx.strokeStyle = def.color;
    ctx.fillStyle = 'rgba(5,5,20,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x - 12, y - 12, 24, 24, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = def.color;
    ctx.font = 'bold 9px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(def.label, x, y + 3);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '9px "Courier New", monospace';
    ctx.fillText(def.desc, x, y + 26);
  }

  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffd60a';
  ctx.font = 'bold 18px "Courier New", monospace';
  ctx.fillText(IS_TOUCH ? 'TAP TO START' : 'PRESS ENTER TO START', W / 2, H * 0.8);
  ctx.globalAlpha = 1;

  if (highScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('HIGH SCORE  ' + String(highScore).padStart(7, '0'), W / 2, H * 0.88);
  }

  // demo ship circling
  const dx = W / 2 + Math.cos(menuT * 0.8) * Math.min(W, H) * 0.32;
  const dy = H * 0.46 + Math.sin(menuT * 1.6) * 30 - 90;
  drawShip(dx, dy, menuT * 0.8 + Math.PI / 2, 1, 0.5, '#19e6ff');
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(4,2,12,0.6)';
  ctx.fillRect(0, 0, W, H);
  const pulse = 0.7 + 0.3 * Math.sin(menuT * 2.5);
  drawCenteredPanel([
    { text: 'SIGNAL LOST', font: `bold ${Math.min(56, W * 0.06)}px "Courier New", monospace`, color: '#ff3b6b', y: H * 0.3, glow: 26 },
    { text: 'SCORE  ' + String(score).padStart(7, '0'), font: 'bold 26px "Courier New", monospace', color: '#ffffff', y: H * 0.46 },
    { text: (newBest ? '★ NEW HIGH SCORE ★' : 'BEST   ' + String(highScore).padStart(7, '0')),
      font: 'bold 18px "Courier New", monospace', color: newBest ? '#ffd60a' : 'rgba(255,255,255,0.6)', y: H * 0.54, glow: newBest ? 18 : 0 },
    { text: 'WAVE ' + wave + '  ·  SECTOR ' + sector, font: '14px "Courier New", monospace', color: '#b86bff', y: H * 0.61 },
  ]);
  if (overT > 1) {
    ctx.globalAlpha = pulse;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd60a';
    ctx.font = 'bold 17px "Courier New", monospace';
    ctx.fillText(IS_TOUCH ? 'TAP TO FLY AGAIN' : 'PRESS ENTER TO FLY AGAIN', W / 2, H * 0.74);
    ctx.globalAlpha = 1;
  }
}

function draw() {
  ctx.save();
  if (shake > 0.3) ctx.translate(rand(-shake, shake) * 0.5, rand(-shake, shake) * 0.5);

  drawBackground();

  if (state === 'menu') {
    drawFx();
    drawMenu();
  } else {
    drawObstacles();
    drawPowerups();
    drawEnemies();
    drawBullets();
    if (state === 'playing') drawPlayer();
    drawFx();
    drawBanners();
    if (state === 'playing') drawHUD();
    if (state === 'over') drawGameOver();
  }
  ctx.restore();

  // damage vignette
  if (damageFlash > 0) {
    const g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.72);
    g.addColorStop(0, 'rgba(255,40,80,0)');
    g.addColorStop(1, `rgba(255,40,80,${0.45 * damageFlash})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
  // low hp heartbeat
  if (state === 'playing' && player.hp <= 1) {
    const beat = 0.12 + 0.1 * Math.sin(menuT * 6);
    const g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
    g.addColorStop(0, 'rgba(255,0,60,0)');
    g.addColorStop(1, `rgba(255,0,60,${beat})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
}

/* ---------- main loop ---------- */
let lastT = performance.now();
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

document.addEventListener('visibilitychange', () => { lastT = performance.now(); });
</script>
</body>
</html>
